services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount host's history directory for debate results
      - /home/rz1998/workspace/ai-readers/history:/app/history
      - ./frontend/dist:/app/dist:ro
      - ./scripts:/app/scripts
      - ./critics:/app/critics
      - ./defenders:/app/defenders
      - ./ROLES:/app/ROLES
      - ./requirements:/app/requirements
      # Mount host's workspace for OpenClaw and scripts
      - /home/rz1998/.openclaw:/root/.openclaw:ro
      - /home/rz1998/workspace/ai-readers:/app/workspace
      # Mount Chinese font file
      - /home/rz1998/workspace/ai-readers/backend/LXGWWenKai-Regular.ttf:/app/LXGWWenKai-Regular.ttf:ro
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOWED_ORIGINS=http://localhost:8091,http://10.147.18.38:8091
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8091:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  history_data:
